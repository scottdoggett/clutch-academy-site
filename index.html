    <!-- Google Analytics 4 + Google Ads (gtag.js) with Consent Mode v2
         (default-deny). The pageview and any subsequent events are queued by
         gtag and only flushed once the user grants consent through the in-app
         ConsentBanner, which flips analytics + ad storage to granted. -->
    <script>
      window.dataLayer = window.dataLayer || []
      function gtag() {
        dataLayer.push(arguments)
      }
      window.gtag = gtag
      gtag('consent', 'default', {
        ad_storage: 'denied',
        ad_user_data: 'denied',
        ad_personalization: 'denied',
        analytics_storage: 'denied',
        functionality_storage: 'granted',
        security_storage: 'granted',
        wait_for_update: 500
      })
      // Read persisted consent BEFORE the gtag config call so the page-view
      // event respects a returning visitor's prior choice.
      try {
        var stored = localStorage.getItem('clutch.consent.v1')
        if (stored === 'granted') {
          gtag('consent', 'update', {
            analytics_storage: 'granted',
            ad_storage: 'granted',
            ad_user_data: 'granted',
            ad_personalization: 'granted'
          })
        }
      } catch (_) {}
      gtag('js', new Date())
      // Skip GA in prerender so the snapshot doesn't fire a synthetic pageview.
      if (!window.__PRERENDER__) {
        gtag('config', 'G-5E5GEN5N59', { anonymize_ip: true })
        // Google Ads conversion tag — same gtag.js library, added as a second
        // config per Google's "tag already installed (e.g. via GA)" setup path.
        gtag('config', 'AW-18196514948')
      }
    </script>
